name: Build and Test
description: Build and test MUMPS with CMake workflow

runs:
  using: "composite"

  steps:

  - name: configure
    shell: bash
    run: >-
      cmake
      --preset default
      -DMUMPS_parallel:BOOL=${{ matrix.parallel }}
      -DMUMPS_scotch:BOOL=${{ matrix.scotch }} -DMUMPS_find_scotch:BOOL=${{ matrix.scotch }}
      -DMUMPS_metis:BOOL=${{ matrix.metis }}
      -DMUMPS_parmetis:BOOL=${{ matrix.parmetis }}
      -DLAPACK_VENDOR=${{ matrix.lapack_vendor }}
      -DMUMPS_openmp:BOOL=${{ matrix.openmp }}
      -DBUILD_SHARED_LIBS:BOOL=${{ matrix.shared }}
      -DMUMPS_ENABLE_RPATH:BOOL=${{ matrix.shared }}

  - name: build, test release
    shell: bash
    run: cmake --workflow default

  - name: install package
    shell: bash
    run: cmake --install build
