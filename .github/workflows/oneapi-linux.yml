name: oneapi-linux

env:
  CC: icx
  CXX: icpx
  FC: ifx
# https://github.com/oneapi-src/oneapi-ci/blob/master/.github/workflows/build_all.yml
# don't need Ninja but it prints the command lines by default which is good for debugging

  # debug triggers asan build errors, peculiar to GitHub Actions

on:
  push:
    paths:
      - "**.c"
      - "**.f"
      - "**.F"
      - "**.f90"
      - "**.F90"
      - "**.cmake"
      - "**/CMakeLists.txt"
      - ".github/workflows/oneapi-linux.yml"
      - ".github/workflows/oneapi*.sh"
      - "!memcheck.cmake"
      - "!coverage.cmake"
      - "!scripts/*"
  workflow_dispatch:

# avoid wasted runs
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  linux:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    strategy:
      matrix:
        preset: [default, int64]

    steps:
    - uses: actions/checkout@v6

    - name: cache install oneAPI
      id: cache-install
      uses: actions/cache@v5
      with:
        path: |
          /opt/intel/oneapi
        key: oneapi-apt

    - name: non-cache install oneAPI
      if: steps.cache-install.outputs.cache-hit != 'true'
      timeout-minutes: 10
      run: |
        .github/workflows/oneapi_setup_apt_repo_linux.sh
        sudo apt install --no-install-recommends \
          intel-oneapi-compiler-dpcpp-cpp \
          intel-oneapi-compiler-fortran \
          intel-oneapi-mkl intel-oneapi-mkl-devel \
          intel-oneapi-mpi intel-oneapi-mpi-devel

    - name: Setup Intel oneAPI environment
      run: |
        source /opt/intel/oneapi/setvars.sh
        printenv >> $GITHUB_ENV

    - name: Tell MPI compiler wrapper flags
      run: mpiifx -show

    - name: CMake build and test
      run: cmake --workflow ${{ matrix.preset }}

    - name: Upload log failure
      if: failure()
      uses: actions/upload-artifact@v7
      with:
        name: oneapi-${{ runner.os }}-CMakeConfigureLog.yaml
        path: build/CMakeFiles/CMakeConfigureLog.yaml

    - name: install package
      run: cmake --install build

    - name: build example
      working-directory: example
      run: cmake --workflow ${{ matrix.preset }}-build


    - name: exclude unused files from cache
      if: steps.cache-install.outputs.cache-hit != 'true'
      run: .github/workflows/oneapi_cache_exclude_linux.sh
